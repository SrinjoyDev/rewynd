name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tell us how to trigger it.
      placeholder: |
        1. Run `rewynd run npm run dev`
        2. Hit `GET /api/...`
        3. Run `rewynd show <id>`
        4. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Run `rewynd version` for the rewynd version.
      value: |
        - OS:
        - Node version:
        - Framework + DB (e.g. Express + Postgres):
        - rewynd version (`rewynd version`):
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant logs, CLI output, or `--json` payloads. Redact anything sensitive.
      render: shell
    validations:
      required: false
