name: Release

on:
  push:
    tags: ["v*"]
  # Manual re-run for an existing tag — e.g. to publish npm/PyPI after adding the tokens,
  # without deleting and re-pushing the tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)publish, e.g. v0.1.0"
        required: true

permissions:
  contents: write
  id-token: write # PyPI Trusted Publishing (OIDC)

env:
  VERSION: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      # On a tag push: cross-platform binaries + GitHub Release + checksums.
      # On a manual re-run: just build the binaries (the release already exists) so the npm
      # packaging below has its inputs, without re-publishing the GitHub Release.
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: ${{ github.event_name == 'push' && 'release --clean' || 'build --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # npm: per-platform binary packages + the `rewynd` wrapper + `@rewynd/shim`.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Build npm platform packages
        run: node scripts/release/build-npm.mjs "${VERSION}"

      - name: Publish to npm
        run: |
          set -e
          if [ -z "$NODE_AUTH_TOKEN" ]; then echo "NPM_TOKEN not set — skipping npm publish"; exit 0; fi
          # Idempotent: a re-run skips versions already on the registry, but still fails on a
          # real error (so a partial publish can be safely re-run).
          publish() {
            if out=$(npm publish --access public 2>&1); then echo "$out"; return 0; fi
            echo "$out"
            if echo "$out" | grep -qiE "cannot publish over|previously published|EPUBLISHCONFLICT"; then
              echo "↳ already published, skipping"; return 0
            fi
            return 1
          }
          for dir in packages/cli-platforms/*; do (cd "$dir" && publish); done
          (cd packages/shim-node && publish)
          (cd packages/cli && publish)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # PyPI: the Python shim, via Trusted Publishing (OIDC — no token to store or rotate).
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build the Python package
        run: |
          python -m pip install --quiet build
          sed -i "s/^version = .*/version = \"${VERSION#v}\"/" packages/shim-python/pyproject.toml
          python -m build packages/shim-python
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/shim-python/dist
          skip-existing: true
