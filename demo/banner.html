<!doctype html>
<!-- Source for demo/banner.png. Render at 2x:
     google-chrome --headless=new --force-device-scale-factor=2 --window-size=1280,400 --screenshot=banner.png file://.../banner.html -->
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 400px; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #11111b; overflow: hidden; position: relative;
  }
  .bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(110% 130% at 6% -15%, rgba(203,166,247,0.22) 0%, rgba(137,180,250,0.07) 36%, rgba(17,17,27,0) 60%),
      radial-gradient(90% 120% at 102% 115%, rgba(116,199,236,0.16) 0%, rgba(17,17,27,0) 52%),
      linear-gradient(135deg, #181825 0%, #1e1e2e 55%, #181825 100%);
  }
  .grid { position: absolute; inset: 0;
    background-image: linear-gradient(rgba(205,214,244,0.03) 1px, transparent 1px);
    background-size: 100% 36px; }

  /* left lockup */
  .badge {
    position: absolute; left: 72px; top: 150px;
    width: 100px; height: 100px; border-radius: 26px;
    background: linear-gradient(150deg, #313146 0%, #1e1e2e 100%);
    border: 1px solid rgba(203,166,247,0.35);
    box-shadow: 0 0 0 1px rgba(17,17,27,0.6), 0 22px 60px -14px rgba(203,166,247,0.5);
    display: flex; align-items: center; justify-content: center;
  }
  .badge svg { width: 54px; height: 54px; }

  .text { position: absolute; left: 204px; top: 122px; max-width: 470px; }
  .wordmark {
    font-weight: 800; font-size: 80px; letter-spacing: -2.5px; line-height: 1;
    background: linear-gradient(92deg, #cba6f7 0%, #89b4fa 48%, #74c7ec 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .tagline { margin-top: 18px; font-size: 26px; line-height: 1.2; font-weight: 600; color: #cdd6f4; letter-spacing: -0.3px; }
  .sub { margin-top: 10px; font-size: 18px; line-height: 1.3; font-weight: 500; color: #8087a2; letter-spacing: 0.1px; white-space: nowrap; }
  .sub.hi { margin-top: 5px; color: #a6adc8; font-weight: 600; }

  /* right: a mini-TUI panel that shows the actual tool */
  .panel {
    position: absolute; left: 712px; top: 64px; width: 504px; height: 272px;
    background: rgba(24,24,37,0.92); border-radius: 16px;
    border: 1px solid rgba(203,166,247,0.20);
    box-shadow: 0 30px 70px -20px rgba(17,17,27,0.9), inset 0 1px 0 rgba(205,214,244,0.05);
    overflow: hidden;
    font-family: 'DejaVu Sans Mono', monospace;
  }
  .panel .bar {
    height: 40px; display: flex; align-items: center; gap: 8px; padding: 0 16px;
    background: linear-gradient(180deg, rgba(49,49,70,0.55), rgba(30,30,46,0.2));
    border-bottom: 1px solid rgba(205,214,244,0.06);
  }
  .tl { width: 11px; height: 11px; border-radius: 50%; }
  .ttl { margin-left: 8px; font-size: 13px; color: #9399b2; letter-spacing: 0.3px; }
  .rec { margin-left: auto; font-size: 12px; font-weight: 700; letter-spacing: 2px; color: #f38ba8; display:flex; align-items:center; gap:7px; }
  .recdot { width: 9px; height: 9px; border-radius: 50%; background: #f38ba8; box-shadow: 0 0 10px 1px rgba(243,139,168,0.7); }

  .rows { padding: 12px 14px; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: center; gap: 12px; font-size: 14.5px; }
  .row.sel { background: rgba(203,166,247,0.10); border-radius: 8px; margin: -4px -8px; padding: 4px 8px; }
  .sd { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .mth { color: #bac2de; width: 42px; }
  .pth { color: #cdd6f4; flex: 1; }
  .st  { width: 30px; text-align: right; font-weight: 700; }
  .bars { width: 70px; letter-spacing: 1px; }
  .flag { width: 38px; font-size: 11px; font-weight: 700; text-align: right; }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>

  <div class="badge">
    <svg viewBox="0 0 24 24" fill="none">
      <defs><linearGradient id="g" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
        <stop stop-color="#cba6f7"/><stop offset="1" stop-color="#89b4fa"/></linearGradient></defs>
      <path d="M11 5.5v13L2.5 12 11 5.5Z" fill="url(#g)"/>
      <path d="M21 5.5v13L12.5 12 21 5.5Z" fill="url(#g)"/>
    </svg>
  </div>

  <div class="text">
    <div class="wordmark">rewynd</div>
    <div class="tagline">The flight recorder for your backend.</div>
    <div class="sub">Every request, query &amp; exception &mdash; correlated, local.</div>
    <div class="sub hi">For humans and the agents that debug alongside them.</div>
  </div>

  <div class="panel">
    <div class="bar">
      <span class="tl" style="background:#f38ba8"></span>
      <span class="tl" style="background:#f9e2af"></span>
      <span class="tl" style="background:#a6e3a1"></span>
      <span class="ttl">rewynd &middot; live</span>
      <span class="rec"><span class="recdot"></span>REC</span>
    </div>
    <div class="rows">
      <div class="row sel">
        <span class="sd" style="background:#a6e3a1"></span>
        <span class="mth">GET</span><span class="pth">/api/users</span>
        <span class="st" style="color:#a6e3a1">200</span>
        <span class="bars" style="color:#89b4fa">▇▇▇<span style="color:#45475a">····</span></span>
        <span class="flag" style="color:#cba6f7">N+1</span>
      </div>
      <div class="row">
        <span class="sd" style="background:#f38ba8"></span>
        <span class="mth">POST</span><span class="pth">/api/orders</span>
        <span class="st" style="color:#f38ba8">500</span>
        <span class="bars" style="color:#f38ba8">▇▇▇▇▇<span style="color:#45475a">··</span></span>
        <span class="flag"></span>
      </div>
      <div class="row">
        <span class="sd" style="background:#a6e3a1"></span>
        <span class="mth">GET</span><span class="pth">/api/feed</span>
        <span class="st" style="color:#a6e3a1">200</span>
        <span class="bars" style="color:#89b4fa">▇▇<span style="color:#45475a">·····</span></span>
        <span class="flag"></span>
      </div>
      <div class="row">
        <span class="sd" style="background:#a6e3a1"></span>
        <span class="mth">GET</span><span class="pth">/api/checkout</span>
        <span class="st" style="color:#a6e3a1">200</span>
        <span class="bars" style="color:#f9e2af">▇▇▇▇▇▇<span style="color:#45475a">·</span></span>
        <span class="flag" style="color:#f9e2af">slow</span>
      </div>
    </div>
  </div>
</body>
</html>
