<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="good" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#cba6f7"/><stop offset="1" stop-color="#a6e3a1"/>
    </linearGradient>
  </defs>
  <rect width="900" height="380" rx="18" fill="#11111b"/>
  <text x="44" y="58" fill="#cdd6f4" font-size="27" font-weight="800">Does rewynd help a coding agent find the bug?</text>
  <text x="44" y="88" fill="#9399b2" font-size="15">4 realistic backend bugs · same model · same prompt · the only difference is rewynd</text>

  <!-- track geometry: x 360..820 = 4 bugs -->
  <!-- without -->
  <text x="44" y="158" fill="#cdd6f4" font-size="18" font-weight="700">without rewynd</text>
  <text x="44" y="180" fill="#6c7086" font-size="13">source + logs (what you have today)</text>
  <rect x="360" y="142" width="460" height="30" rx="8" fill="#313244"/>
  <rect x="360" y="142" width="345" height="30" rx="8" fill="#f9e2af"/>
  <text x="715" y="163" fill="#f9e2af" font-size="17" font-weight="800">3 / 4</text>

  <!-- with -->
  <text x="44" y="244" fill="#cdd6f4" font-size="18" font-weight="700">with rewynd</text>
  <text x="44" y="266" fill="#6c7086" font-size="13">it reads the recorded trace</text>
  <rect x="360" y="228" width="460" height="30" rx="8" fill="#313244"/>
  <rect x="360" y="228" width="460" height="30" rx="8" fill="url(#good)"/>
  <text x="830" y="249" fill="#a6e3a1" font-size="17" font-weight="800">4 / 4</text>

  <text x="44" y="318" fill="#a6adc8" font-size="14">On the silently-failing background job, the agent <tspan fill="#f38ba8" font-weight="700">without</tspan> rewynd confidently guessed the <tspan fill="#f38ba8" font-weight="700">wrong</tspan> cause.</text>
  <text x="44" y="340" fill="#a6adc8" font-size="14"><tspan fill="#a6e3a1" font-weight="700">With</tspan> rewynd it read the actual exception. Correct <tspan font-style="italic">and confident</tspan>: 2/4 → 4/4.</text>
  <text x="830" y="365" fill="#45475a" font-size="12" text-anchor="end">bench/agent-eval · reproducible</text>
</svg>
